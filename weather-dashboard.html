<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Real-time Weather & Forecast</title>
    <link rel="stylesheet" href="weather-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Real-time Weather & Forecast</p>
        </header>

        <!-- Search Section -->
        <div class="search-container">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Search for a city..." 
                autocomplete="off"
            >
            <button id="searchBtn" class="btn btn-primary">Search</button>
            <button id="locationBtn" class="btn btn-secondary">📍 My Location</button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage"></div>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
        </div>

        <!-- Current Weather -->
        <section id="currentWeather" class="hidden">
            <div class="weather-header">
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Weather Icon">
                    <div class="temperature-info">
                        <h2 id="cityName"></h2>
                        <div id="temperature"></div>
                        <div id="weatherDescription"></div>
                        <div id="feelsLike"></div>
                    </div>
                </div>
            </div>

            <!-- Weather Details Grid -->
            <div class="weather-details">
                <div class="detail-card">
                    <div class="detail-label">💧 Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">💨 Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">📊 Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">👁️ Visibility</div>
                    <div class="detail-value" id="visibility"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">☁️ Cloudiness</div>
                    <div class="detail-value" id="cloudiness"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">☀️ UV Index</div>
                    <div class="detail-value" id="uvIndex"></div>
                </div>
            </div>

            <!-- Sun Times -->
            <div class="sun-times">
                <div class="sun-time">
                    <div class="sun-time-label">🌅 Sunrise</div>
                    <div class="sun-time-value" id="sunrise"></div>
                </div>
                <div class="sun-time">
                    <div class="sun-time-label">🌇 Sunset</div>
                    <div class="sun-time-value" id="sunset"></div>
                </div>
            </div>
        </section>

        <!-- Hourly Forecast -->
        <section id="hourlyForecast" class="hidden">
            <h3 class="section-title">24-Hour Forecast</h3>
            <div id="hourlyContainer"></div>
        </section>

        <!-- 5-Day Forecast -->
        <section id="forecastSection" class="hidden">
            <h3 class="section-title">5-Day Forecast</h3>
            <div id="forecastContainer"></div>
        </section>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
